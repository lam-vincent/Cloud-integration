apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-planning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poker-planning
  template:
    metadata:
      labels:
        app: poker-planning
    spec:
      containers:
      - name: poker-planning
        # To deploy: replace placeholders with your registry. See README for setup instructions.
        image: ${YOUR_REGISTRY_HOST}/${YOUR_GCP_PROJECT_ID}/poker-repo/poker-planning:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: poker-planning-service
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "frontend-backend-config"}'
spec:
  selector:
    app: poker-planning
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
