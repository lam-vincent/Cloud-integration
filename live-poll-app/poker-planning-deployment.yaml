apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-planning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poker-planning
  template:
    metadata:
      labels:
        app: poker-planning
    spec:
      containers:
      - name: poker-planning
        image: europe-west1-docker.pkg.dev/poker-planning-489721/poker-repo/poker-planning:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: poker-planning-service
spec:
  selector:
    app: poker-planning
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
