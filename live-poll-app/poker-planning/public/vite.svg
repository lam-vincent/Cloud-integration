<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="100" height="140">
  <!-- Card background -->
  <rect x="2" y="2" width="96" height="136" rx="10" ry="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Spade symbol (center) -->
  <text x="50" y="88" font-size="64" text-anchor="middle" fill="#f8fafc" font-family="serif">♠</text>
  <!-- Corner labels -->
  <text x="12" y="24" font-size="16" fill="#f8fafc" font-family="sans-serif" font-weight="bold">?</text>
  <text x="88" y="128" font-size="16" fill="#f8fafc" font-family="sans-serif" font-weight="bold" text-anchor="middle" transform="rotate(180, 88, 122)">?</text>
</svg>
