apiVersion: apps/v1
kind: Deployment
metadata:
  name: poll-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poll-service
  template:
    metadata:
      labels:
        app: poll-service
    spec:
      containers:
      - name: poll-service-container
        image: europe-west1-docker.pkg.dev/poker-planning/poker-repo/poll-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
          - name: PGUSER
            value: "admin"
          - name: PGHOST
            value: "postgres-service"
          - name: PGDATABASE
            value: "polldb"
          - name: PGPORT
            value: "5432"
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD