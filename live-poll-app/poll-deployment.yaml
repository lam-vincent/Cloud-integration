apiVersion: apps/v1
kind: Deployment
metadata:
  name: poll-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poll-service
  template:
    metadata:
      labels:
        app: poll-service
    spec:
      containers:
      - name: poll-service-container
        # To deploy: replace placeholders with your registry. See README for setup instructions.
        image: <YOUR_REGISTRY_HOST>/<YOUR_GCP_PROJECT_ID>/poker-repo/poll-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
          - name: PGUSER
            value: "admin"
          - name: PGHOST
            value: "postgres-service"
          - name: PGDATABASE
            value: "polldb"
          - name: PGPORT
            value: "5432"
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 30