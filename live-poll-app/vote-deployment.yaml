apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vote-service
  template:
    metadata:
      labels:
        app: vote-service
    spec:
      containers:
      - name: vote-service-container
        image: REDACTED_REGISTRY_HOST/poker-planning/poker-repo/vote-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
          - name: PGUSER
            value: "admin"
          - name: PGHOST
            value: "postgres-service"
          - name: PGDATABASE
            value: "polldb"
          - name: PGPORT
            value: "5432"
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD