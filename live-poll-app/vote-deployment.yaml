apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vote-service
  template:
    metadata:
      labels:
        app: vote-service
    spec:
      containers:
      - name: vote-service-container
        image: mrccniv/vote-service:1.1
        ports:
        - containerPort: 3001